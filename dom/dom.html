  // 这个结点及其里面的某个结点或者某个结点的文本结点中是否提到过这个text字符串
  function talksAbout(node, text) {
    // 如果这个结点的nodeType == 文本结点
    if (node.nodeType == document.TEXT_NODE) {
      // 找到了就返回≥0的数，找到了就告诉你找到的位置在哪里
      return node.data.indexOf(text) >= 0 // 整个这个是一个布尔表达式,indexOf返回的是第一次遇见目标字符串的下标
      // 如果它是元素结点的话我们就是看元素结点里面的每个子节点是否考虑到了
    } else if (node.nodeType == document.ELEMENT_NODE) {
      for (var i = 0; i < node.childNodes.length; i++) {
        if (talksAbout(node.childNodes[i], text)) {
          return true
        }
      }
      return false
    }
  }

  // 高亮代码，利用了正则表达式
  function highlightCode(node, keywords) {
    var text = node.textContent // textContent属性用于获取节点中的所有文本
    node.textContent = ""// 将它设置为空
    var match, pos = 0 // match用来存储每次匹配到的结果，pos记录当前的扫描位置
    while (match == keywords.exec(text)) { // 拿到匹配结果
      var befor = text.slice(pos, match.index) // 取出当前位置到匹配开始(match.index)之间的文字
      node.appendChild(document.createTextNode(befor)) // 创建纯文本节点并追加到node中去
      var strong = document.createElement("strong") // 创建一个strong元素，
      strong.appendChild(document.createTextNode(match[0])) // 里面放入匹配到的关键字文本
      node.appendChild(strong) // 插入node
      pos = keywords.lastIndex // 更新位置
    }
    var after = text.slice(pos) // 循环结束后，可能还有一段未匹配的文字
    node.appendChild(document.createTextNode(after)) // 把剩余的全部追加为普通文本
  }

  function elt(type) {
    var node = document.createElement(type);
    for (var i = 1; i < arguments.length; i++) {
      var child = arguments[i];
      if (typeof child == "string") {
        child = document.createTextNode(child);
        node.appendChild(child);
      }
    }
    return node
  }

  // <p data-classified="secret">The launch code is 00000000.</p>

  var paras = document.body.getElementsByTagName("p");
  Array.prototype.forEach.call(paras, function (para) {
    if (para.getAttribute("data-classified") == "secret")
      para.parentNode.removeChild(para); // 注意元素不能自己删自己，只能从父元素上面去删除
  });

  var languages = {

  function highlightAllCode() {
    var pres = document.body.getElementsByTagName("pre");
    for (var i = 0; i < pres.length; i++) {
      var pre = pres[i];
      var lang = pre.getAttribute("data-language");
      if (languages.hasOwnProperty(lang)) {
        highlightCode(pre, languages[lang]);
      }
    }
  }

  function time(name, action) {
    var start = Date.now(); // Current time in milliseconds
    action();
    console.log(name, "took", Date.now() - start, "ms");
  }

  time("naive", function () {
    var target = document.getElementById("one");
    while (target.offsetWidth < 2000)
      target.appendChild(document.createTextNode("X"));
  });
  // → naive took 32 ms

  time("clever", function () {
    var target = document.getElementById("two");
    target.appendChild(document.createTextNode("XXXXX"));
    var total = Math.ceil(2000 / (target.offsetWidth / 5));
    for (var i = 5; i < total; i++) {
      target.appendChild(document.createTextNode("X"));
    }
  });
  // → clever took 1 ms
