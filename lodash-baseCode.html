<script id="isObjectLike">
  // 这个底层函数的作用就是能不能像对象一样的访问属性
  function isObjectLike(value) {
    return value != null && typeof value === 'object'
  }
  isObjectLike({})        // true
  isObjectLike([])        // true
  isObjectLike(new Date)  // true
  isObjectLike(/a/)       // true

  isObjectLike(null)      // false（非常重要）
  isObjectLike(undefined) // false
  isObjectLike(1)         // false
  isObjectLike('abc')     // false
  isObjectLike(true)      // false
</script>

<script id="isObject">
  function isObject(value) {
    var type = typeof value
    return value != null && (type === 'object' || type === 'function')
  }
</script>
<script id="isArrayLike">
  function isArrayLike(value) {
    return value != null && isLength(value.length) && !isFunction(value)
  }
</script>
<script id="isIndex">

    length = length == null ? MAX_SAFE_INTEGER : length
    return !!length &&

      (value > -1 && value % 1 == 0 && value < length)
  }
</script>
<script id="eq">
  // 这个函数是排除NaN
  function eq(value, other) {
    return value === other || (value !== value && other !== other)
  }
</script>
<script id="baseSlice">
  function baseSlice(array, start, end) {
    var index = -1
    var length = array.length
    if (start < 0) {
      start = -start > length ? 0 : (length + start)
    }
    end = end > length ? length : end
    if (end < 0) {
      end += length
    }
    length = start > end ? 0 : ((end - start) >>> 0)
    start >>>= 0
    var result = Array(length)
    while (++index < length) {
      result[index] = array[index + start]
    }
    return result
  }
  // Math.floor(NaN) // -> NaN
  undefined >>> 0     // -> 0
  NaN >>> 0          // -> 0
  2.5 >>> 0          // -> 2
  '2' >>> 0     // -> 2

<script id="isIterateeCall">
  function isIterateeCall(value, index, object) {
    if (!isObject(object)) {
      return false
    }
    var type = typeof value
    if (type == 'number'
      ? (isArrayLike(object) && isIndex(index, object.length))

<script id="toFinite">
  function toFinite(value) {
    if (!value) {
      return value === 0 ? value : 0
    }
    value = toNumber(value)
    if (value === INFINITY || value === -INFINITY) {
      var sign = (value < 0 ? -1 : 1);
      return sign * MAX_INTEGER;
    }
    return value === value ? value : 0;
  }

<script id="arrayFilter">
  function arrayFilter(array, predicate) {
    var index = -1,
      length = array == null ? 0 : array.length,
      resIndex = 0,
      result = [];
    while (++index < length) {
      var value = array[index]
      if (predicate(value, index, array)) {
        result[resIndex++] = value
      }
    }
    return result
  }
</script>
<script id="apply">
  function apply(func, thisArg, args) {
    switch (args.length) {
      case 0: return func.call(thisArg)
      case 1: return func.call(thisArg, args[0])
      case 2: return func.call(thisArg, args[0], args[1])
      case 3: return func.call(thisArg, args[0], args[1], args[2])
    }
    return func.apply(thisArg, args)
  }
