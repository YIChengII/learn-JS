<script>
  // 这个是一个极简的Vue感应机制
  let currentInstance = null; // 全局“记录仪”

  // 模拟 Vue 内部的生命周期注册函数
  function onBeforeUpdate(fn) {
    if (currentInstance) {
      // 关键：把函数钩在当前正在运行的那个实例上
      currentInstance.hooks.push(fn);
    } else {
      console.error("钩子必须在 setup 中同步调用！");
    }
  }

  // 模拟组件构造器
  function createComponent(setupFn) {
    const instance = {
      hooks: [],
      mount() {
        // 1. 设置当前环境
        currentInstance = instance;
        // 2. 执行 setup (用户代码)
        setupFn();
        // 3. 清除环境（过河拆桥）
        currentInstance = null;
      }
    };
    return instance;
  }

  // --- 用户代码 ---
  const myComp = createComponent(() => {
    onBeforeUpdate(() => console.log("组件更新啦！")); // 成功感知！

    setTimeout(() => {
      // onBeforeUpdate(() => {}); // 如果在这调，就会报错，因为 currentInstance 已是 null
    }, 100);
  });

  myComp.mount();
  console.log(myComp.hooks); // 你会发现函数成功挂载到了 myComp 上
</script>
