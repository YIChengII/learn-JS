<script>

  // 以及对数组方法的劫持，会存在一些问题，如数组的下标直接赋值不能响应式，以及对象新增属性也无法实现响应式.
  // v3中使用的Proxy来实现的对对象的监控（gette/setter也依然有用到），所以各种对对象的修改方式都能被监控到，
  // 进而也都能被响应式系统发现
  // v3中性能有比较大的提升（而且在最新的版本中，已经去掉虚拟dom了）
</script>
