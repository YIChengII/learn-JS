<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://unpkg.com/vue@2/dist/vue.min.js"></script>
  <style>
    /* 简单的基础样式，不影响逻辑 */
    .active { border: 2px solid red; background-color: red; }
    .dot { width: 10px; height: 10px; display: inline-block; border-radius: 50%; background: grey; margin: 5px; cursor: pointer; }
  </style>
</head>
<body>

<div id="app">
  <slider :imgs="list"></slider>
</div>

<script>
  // 1. 定义员工（子组件）
  Vue.component('slider', {
    // 【门槛】要求传入的必须是数组
    props: {
      imgs: Array
    },
    // 【长相】最简单的结构
    template: `
      <div>
        <img :src="imgs[currentIdx]" width="200"><br>

        <button @click="prev">上一张</button>
        <button @click="next">下一张</button>

        <div>
          <span v-for="(item, idx) in imgs" 
                class="dot"
                :class="{ active: idx === currentIdx }"
                @click="currentIdx = idx">
          </span>
        </div>
      </div>
    `,
    // 【口袋】自己管自己的进度
    data() {
      return {
        currentIdx: 0
      }
    },
    // 【技能】加减法逻辑
    methods: {
      next() {
        this.currentIdx = (this.currentIdx + 1) % this.imgs.length;
      },
      prev() {
        this.currentIdx = (this.currentIdx - 1 + this.imgs.length) % this.imgs.length;
      }
    }
  });

  // 2. 启动老板（根实例）
  new Vue({
    el: '#app',
    data: {
      list: [
        'https://www.12306.cn/index/images/abanner06.jpg',
        'https://www.12306.cn/index/images/abanner05.jpg'
      ]
    }
  });
</script>

</body>
</html>
