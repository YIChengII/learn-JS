  function parseINI(string) {
    // Start with an object to hold the top-level fields
    var currentSection = { name: null, fields: [] };
    var categories = [currentSection];

    string.split(/\r?\n/).forEach(function (line) {
      var match;
      if (/^\s*(;.*)?$/.test(line)) { // 是否是空行或者是注释行
        return;
      } else if (match = line.match(/^\[(.*)\]$/)) { // 匹配大括号，因为是特殊字符所以用\转义
        currentSection = { name: match[1], fields: [] };
        categories.push(currentSection);
      } else if (match = line.match(/^(\w+)=(.*)$/)) {
        currentSection.fields.push({
          name: match[1],
          value: match[2]
        });
      } else {
        throw new Error("Line '" + line + "' is invalid.");
      }
    });
    return categories;
  }

  // String 上的raw方法就是这么写的
  // parts表示的是静态部分，...values是插值表达式的计算结果
  // 不会自动转义
  function raw(parts, ...values) {
    var result = ''
    for (var i = 0; i < values.length; i++) {
      // 如果直接使用parts[i],你会得到处理后的字符串（可能已经转义）
      result += parts.raw[i] + values[i]
    }
    return result + parts.raw[i]
  }

  RegExp.prototype.myTest = function (str) {

  String.prototype.mySplit = function (re) {
    var result = []
    var match
    var lastLastIndex = 0
    while (match = re.exec(this)) {
      result.push(this.slice(lastLastIndex, match.index))
      result.push(...match.slice(1))
      lastLastIndex = re.lastIndex
    }
    result.push(this.slice(lastLastIndex))
    return result
  }

  // match.index	这次匹配在字符串中开始的位置（数值）
  // match.input	被匹配的原始字符串
  // match.groups	命名捕获组结果（ES2018 新增）
  // 字符串的所有方法都不会改变正则的lastIndex属性

  String.prototype.myMatch = function (re) {
    if (re.global) {
      var result = []
      var match
      while (match = re.exec(this)) {
        result.push(match[0])
      }
      if (result.lenngth == 0) {
        return null

        return result

    } else {

  // re.multiline	是否带有 m 标志（多行模式）	/a/m → true
  // re.sticky	是否带有 y 标志	/a/y → true
  // re.unicode	是否带有 u 标志	/a/u → true

  String.prototype.myReplace = function (re, replacer) { // replacer是一个回调函数
    var result = ''
    var match
    var lastLastIndex = 0
    while (match = re.exec(this)) {
      result += this.slice(lastLastIndex, match.index)
      result += replacer(...match)
      lastLastIndex = re.lastIndex
    }
    return result + this.slice(lastLastIndex)
  }
