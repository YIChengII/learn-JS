<script>
  // 映射的经典实现能让每个基本操作都O（1）的时间复杂度
  // 其关键原理就是：只根据key通过确定的算法计算出一个值，并最后模上存储数据用的数组的长度，就得到一个下标，
  // 就把这组映射的数据存在这个下标位置上
  // 映射表在其它的语言里面也称为哈希表
  // 根据key计算出一个确定的随机数的函数在这里称为哈希函数，所以映射表也称为哈希表（在某些语言里（python)也叫字典）
  // 哈希冲突
  // key可能是（foo, bar, baz, abc, xg, bcx,等等)，通过f函数计算出一个位置，f就是哈希函数
  // 所以key的值它是多变的它很有可能计算出同一个位置
  // 设计哈希表时必须要考虑处理哈希冲突的方法
  // 重新哈希法:设计多个哈希函数，第一个不行换第二个，以此类推

  // 简易开放地址法
  class HashMap {
    constructor() {
      this._keys = new Array(16)
      this._vals = new Array(16)
      this._size = 0
    }
    _hash(key) {
      var seed = 131313
      var hash = 0
      for (var i = 0; i < key.length; i++) {
        hash = ((hash * seed >>> 0) + key.charCodeAt(i)) >>> 0
      }
      return hash % this._keys.length
    }
    set(key, val) {
      var idx = this._hash(key)
      for (var i = idx, j = 0; j < this._keys.length; i++, j++) {   // 线性探测
        if (i === this._keys.length) {
          i = 0
        }
        if (this._keys[i] == key) {
          this._vals[i] = val
          return this
        } else if (this._keys[i] == null) {
          this._keys[i] = key
          this._vals[i] = val
          this._size++
          return this
        }
      }
      return this
    }
    get(key) {
      var idx = this._hash(key)
      for (var i = idx, j = 0; j < this._keys.length; i++, j++) {
        if (i === this._keys.length) {
          i = 0
        }
        if (this._keys[i] == key) {
          return this._vals[i]
        } else if (this._keys[i] == null) {
          return undefined
        }
      }
      return undefined
    }
  }

  // 链式存储法解决哈希冲突
  class HashsMap {
    constructor() {
      this._capacity = 16
      // 表示每个位置存的链表都是一个空链表
      this._list = new Array(this._capacity).fill(null)
      this._size = 0
      // 扩张因子
      this._growFactor = 0.75
      // 收缩因子
      this._shrinkFactor = 0.125
    }
    // 哈希函数
    _hash(key) {
      if (typeof key == 'number') {
        key = 'N-' + key
      }
      if (typeof key == 'string') {
        key = 'S-' + key
      }
      var seed = 13131313
      var hash = 0
      for (var i = 0; i < key.length; i++) {
        hash = ((hash * seed >>> 0) + key.charCodeAt(i)) >>> 0
      }
      return hash % this._capacity
    }
    // 扩容函数
    grow() {
      var oldlist = this._list
      this._capacity *= 2
      this._list = new Array(this._capacity)
      this._size = 0
      for (var list of oldlist) {
        var p = list
        while (p) {
          this.set(p.key, p.val)
          p = p.next
        }
      }
    }
    // 收缩函数
    shrink() {
      if (this._capacity <= 32) {
        return
      }
      this._capacity /= 2
      var oldlist = this._list
      this._list = new Array(this._capacity)
      this._size = 0
      for (var list of oldlist) {
        var p = list
        while (p) {
          this.set(p.key, p.val)
          p = p.next
        }
      }
    }
    // 直接计算装载因子
    _loadFactor() {
      return this._size / this._capacity
    }
    set(key, val) {
      var idx = this._hash(key)
      var p = this._list[idx]
      while (p) {
        if (p.key == key) {
          p.val = val
          return this
        }
        p = p.next
      }
      var node = {  // 这个是链式哈希"头插法"
        key: key,
        val: val,
        next: this._list[idx] // this._list[idx] 相当于哈希数组的第idx个槽位
      }
      this._list[idx] = node // 让新节点成为表头
      this._size++
      if (this._loadFactor() > this._growFactor) {
        this.grow()
      }
      return this
    }
    // 拿到链表
    get(key) {
      var idx = this._hash(key)
      var p = this._list[idx]
      while (p) {
        if (p.key == key) {
          return p.val
        }
        p = p.next
      }
      return undefined
    }
    // 找到它存在的位置然后把它读出来,判断某个key是否存在
    has(key) {
      var idx = this._hash(key)
      var p = this._list[idx]
      while (p) {
        if (p.key == key) {
          return true
        }
        p = p.next
      }
      return false
    }
    // 删除这个结点
    delete(key) {
      var idx = this._hash(key)
      var p = this._list[idx]
      if (p == null) {
        return false
      }
      if (p.key == key) {
        this._list[idx] = p.next
        this._size--
        if (this._loadFactor() < this._shrinkFactor) {
          this.shrink()
        }
      }
      while (p.next) {
        if (p.next.key == key) {
          p.next = p.next.next
          this._size--
          if (this._loadFactor() < this._shrinkFactor) {
            this.shrink()
          }
        }
        p = p.next
      }
      return false // 表示没有东西可以删除
    }
    forEach(action) {
      for (var list of this._list) {
        var p = list
        while (p) {
          action(p.val, p.key)
          p = p.next
        }
      }
    }
    get size() {   // get size() 就是一个“伪属性”，用来安全地读取 _size 的值。
      // 只是一个取值器
      return this._size
    }
  }

  // 在传统的哈希表下key只能是字符串，不能是别的东西

  // 哈希函数
  function hash(key) {
    var seed = 131313
    var hash = 0
    for (var i = 0; i < key.length; i++) {

  new Map() 是 JavaScript 中用于创建一个新的 Map 对象的构造函数。Map 对象是一种存储键值对的数据结构，

  性能：在频繁增删键值对的场景下，Map 的性能优于普通对象。
  基本用法
  创建空 Map：const map = new Map();。
  初始化 Map：可以传入一个包含键值对的可迭代对象（如数组）来初始化

  常用方法

  获取值：map.get(key)。
  检查键是否存在：map.has(key)。

  清空 Map：map.clear()。
