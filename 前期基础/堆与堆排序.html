<script>
  // 维护动态集合的最值问题（不能同时维护最大值和最小值）只能选择其一
  // 又名优先队列（既最值是优先的）
  // Heap和Priority Queue

  // heap这个词有两个意思：
  // 一个意思就是这里的优先队列的另一个名字。
  // 另一个意思是堆内存（与栈内存对应）操作的是内存，必须提前知道它的所占的字节
  // 乱堆乱放
  // 堆是一个完全二叉树，且这个二叉树中每个结点都比其两个子结点要大（或者小）
  // 可以看出，一个大顶堆的最大值在堆顶（既完全二叉树的根结点）
  // 但堆只保证最值元素的序，所以对这颗进行先序，中序，后序，或者按层遍历，都不会得到有序结果
  // 由于堆是完全二叉树，所以它应该如何存储？？？
  // 用简单形式的数组存储就可以了
  // 因为完全二叉树的前面没有任何空位置，存成数组形式不会浪费任何空间
  // 堆支持两种操作，一个是增加一个元素，一个删除堆顶元素
  // 栈是有序的临时存储，堆是无序的大仓库
  // 栈内存，函数调用过程中的执行上下文（变量、参数、作用域链信息等）

  class PriorityQueue {
    constructor() {
      this._vals = []
    }
    _swap(i, j) {  // 交换位置的函数
      var t = this._vals[i]
      this._vals[i] = this._vals[j]
      this._vals[j] = t
    }
    // 往堆中增加一个值，并维护堆的性质
    push(val) {
      this._vals.push(val)
      var idx = this._vals.length - 1
      while (idx > 0) {
        var pIdx = (idx - 1) >> 1 // 这样就可以快速的冒泡，保持堆的稳定
        if (this._vals[idx] > this._vals[pIdx]) {
          this._swap(idx, pIdx)
          idx = pIdx
        } else {
          break
        }
      }
      return this
    }
    // 删除堆顶元素（即最值）并维护堆的性质
    pop() {
      if (this._vals.length == 0) {
        return undefined
      }
      if (this._vals.length == 1) {
        return this._vals.pop()  // JS中数组里面内置的pop()方法
      }
      var result = this._vals[0]
      this._vals[0] = this._vals.pop()
      var i = 0
      var maxIdx = i
      while (true) {
        var leftIdx = maxIdx * 2 + 1
        if (leftIdx < this._vals.length && this._vals[leftIdx] > this._vals[maxIdx]) {
          maxIdx = leftIdx
        }
        var rightIdx = leftIdx + 1
        if (rightIdx < this._vals.length && this._vals[rightIdx] > this._vals[maxIdx]) {
          maxIdx = rightIdx
        }
        if (maxIdx !== i) {
          this._swap(maxIdx, i)
          i = maxIdx
        } else {
          break
        }
      }
      return result
    }
    // 查看堆顶元素的值但并不删除它（不改变堆的状态）
    peek() {
      return this._vals[0]
    }
    get size() {
      return this._vals.length
    }
  }

  class PriorityQueue2 {
    constructor(predicate = it => it) {  // 这个返回自己的函数的作用是定义每个元素的“优先级”或“权值，让堆变得可定制
      // 在原本的堆结构中，比如最大堆或最小堆，
      // 我们通常直接比较元素：
      // if (this._vals[idx] > this._vals[pIdx])
      // 但是这样只能处理数字或简单的可比较类型。
      // 如果堆里存的是对象，比如任务、事件、节点，就不能直接用 > 来比较了。
      // 这时就需要 predicate 来告诉堆：
      // “我该根据元素的哪个属性来判断优先级？”
      this._vals = []
      this.predicate = predicate
    }
    _swap(i, j) {
      var t = this._vals[i]
      this._vals[i] = this._vals[j]
      this._vals[j] = t
    }
    // 往堆中增加一个值，并维护堆的性质
    push(val) {
      this._vals.push(val)
      var idx = this._vals.length - 1
      while (idx > 0) {
        var pIdx = (idx - 1) >> 1
        if (this.predicate(this._vals[idx]) > this.predicate(this._vals[pIdx])) {
          this._swap(idx, pIdx)
          idx = pIdx
        } else {
          break
        }
      }
      return this
    }
    // 删除堆顶元素（即最值）并维护堆的性质
    pop() {
      if (this._vals.length == 0) {
        return undefined
      }
      if (this._vals.length == 1) {
        return this._vals.pop()
      }
      var result = this._vals[0]
      this._vals[0] = this._vals.pop()
      var i = 0
      var maxIdx = i
      while (true) {
        var leftIdx = maxIdx * 2 + 1
        if (leftIdx < this._vals.length && this.predicate(this._vals[leftIdx]) > this.predicate(this._vals[maxIdx])) {
          maxIdx = leftIdx
        }
        var rightIdx = leftIdx + 1
        if (rightIdx < this._vals.length && this.predicate(this._vals[rightIdx]) > this.predicate(this._vals[maxIdx])) {
          maxIdx = rightIdx
        }
        if (maxIdx !== i) {
          this._swap(maxIdx, i)
          i = maxIdx
        } else {
          break
        }
      }
      return result
    }
    // 查看堆顶元素的值但并不删除它（不改变堆的状态）
    peek() {
      return this._vals[0]
    }
    get size() {
      return this._vals.length
    }
  }

  class PriorityQueue3 {
    constructor(compare) { // 比较策略函数
      // let taskHeap = new PriorityQueue3((a, b) => a.priority - b.priority)
      // taskHeap.push({ name: '吃饭', priority: 2 })
      // taskHeap.push({ name: '写报告', priority: 5 })
      // taskHeap.push({ name: '打游戏', priority: 1 })
      // taskHeap.pop() // { name: '写报告', priority: 5 }
      this._vals = []
      this.compare = compare
    }
    _swap(i, j) {
      var t = this._vals[i]
      this._vals[i] = this._vals[j]
      this._vals[j] = t
    }
    // 往堆中增加一个值，并维护堆的性质
    push(val) {
      this._vals.push(val)
      var idx = this._vals.length - 1
      while (idx > 0) {
        var pIdx = (idx - 1) >> 1
        if (this.compare(this._vals[idx], this._vals[pIdx]) > 0) {
          this._swap(idx, pIdx)
          idx = pIdx
        } else {
          break
        }
      }
      return this
    }
    // 删除堆顶元素（即最值）并维护堆的性质
    pop() {
      if (this._vals.length == 0) {
        return undefined
      }
      if (this._vals.length == 1) {
        return this._vals.pop()
      }
      var result = this._vals[0]
      this._vals[0] = this._vals.pop()
      var i = 0
      var maxIdx = i
      while (true) {
        var leftIdx = maxIdx * 2 + 1
        if (leftIdx < this._vals.length && this.compare(this._vals[leftIdx], this._vals[maxIdx]) > 0) {
          maxIdx = leftIdx
        }
        var rightIdx = leftIdx + 1
        if (rightIdx < this._vals.length && this.compare(this._vals[rightIdx], this._vals[maxIdx]) > 0) {
          maxIdx = rightIdx
        }
        if (maxIdx !== i) {
          this._swap(maxIdx, i)
          i = maxIdx
        } else {
          break
        }
      }
      return result
    }
    // 查看堆顶元素的值但并不删除它（不改变堆的状态）
    peek() {
      return this._vals[0]
    }
    get size() {        //封装性：
      // _vals 是堆内部存储数组，不希望外部直接操作它。
      // 提供 size 可以安全地读取堆的大小，而不用直接暴露数组。
      // 易用性：
      // 访问堆大小像访问普通属性一样简单：
      // if (pq.size > 0) { ... }
      // 不需要写 pq._vals.length，更符合面向对象设计。
      // 可扩展性：
      // 将来如果堆内部实现发生变化（比如分段存储），你只需改 getter 内部逻辑，外部调用 size 不受影响
      return this._vals.length
    }
  }


  // 有接口以后我们就可以使用函数来实现我的逻辑
  function heapSort(array) {
    var pq = new PriorityQueue() // 如果是最大堆，那么就会成升序序列
    for (var item of array) {
      pq.push(item)
    }
    for (var i = array.length - 1; i >= 0; i--) {
      array[i] = pq.pop()
    }
    return array
  }

  // 将数组原地堆化,倒着向下调整
  function heapify(array) {
    for (var i = (array.length - 2) >> 1; i >= 0; i--) {
      heapDown(array, i)
    }
    return array
  }
  function swap(array, i, j) {
    var t = array[i]
    array[i] = array[j]
    array[j] = t
  }
  // 原地堆化
  // l表示小于l位置的元素才是堆里的元素，大于等于l位置的数据本函数不用考虑
  function heapDown(array, i, l = array.length) {
    var maxIdx = i
    while (true) {
      var leftIdx = maxIdx * 2 + 1
      if (leftIdx < l && array[leftIdx] > array[maxIdx]) {
        maxIdx = leftIdx
      }
      var rightIdx = leftIdx + 1
      if (rightIdx < l && array[rightIdx] > array[maxIdx]) {
        maxIdx = rightIdx
      }
      if (maxIdx !== i) {
        swap(array, maxIdx, i)
        i = maxIdx
      } else {
        break
      }
    }
  }
  // 最差情况下时间复杂度： O(n*log(n))
  // 堆排序不会退化
  // 空间复杂度： O(1)
  // 排序的稳定性：不稳定的
  function heapSortInPlace(array) {
    heapify(array)
    for (var i = array.length - 1; i > 0; i--) {
      swap(array, 0, i)
      heapDown(array, 0, i)
    }
    return array
  }

</script>
