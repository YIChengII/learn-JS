  function phi(table) {
    return (table[3] * table[0] - table[2] * table[1]) /
      Math.sqrt(
        (table[2] + table[3]) *
        (table[0] + table[1]) *
        (table[1] + table[3]) *
        (table[0] + table[2]))
  }

  function range(start, end, step = 1) {
    if (step === 0) throw new Error

    if (step > 0) {
      for (let i = start; i <= end; i += step) arr.push(i);
    } else {
      for (let i = start; i >= end; i += step) arr.push(i);
    }
    return arr
