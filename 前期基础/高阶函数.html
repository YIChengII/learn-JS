  // 数组里面嵌套数组(深度扁平化)
  function flattenDeep(array) {
    var result = []
    for (var i = 0; i < array.length; i++) {
      if (Array.isArray[i]) {
        result.push(...flattenDeep(array[i]))  // 递归展平

  // every 将会把数组的每一项传给这个function,如果每一项能让这个函数返回真，那么就返回真

  function every(array, test) {
    for (var i = 0; i < array.length; i++) {
      if (!test(array[i], i, array)) {
        return false
      }
    }
    return true
  }

  // reduce 写法, 这里的话回顾布尔类型的值，如果&&运算的话，那么它们的相互比较左边为真的话右边不会去做比较
  // 累计&&运算
  function every(array, test) {
    return array.reduce((r, val, i) => {
      return r && test(val, i, array)
    }, true)
  }

  // some 但凡里面有一个返回真那么就返回真
  function some(array, test) {
    for (var i = 0; i < array.length; i++) {
      if (test(array[i], i, array)) return true
    }
    return false
  }
  // some 的reduce写法
  function some(array, test) {
    return array.reduce((r, val, i) => {
      return r || test(val, i, array)
    }, false)
  }
  // some 用every来实现
  function some(array, test) {
    return !every(array, (...args) => !test(...args))
  }
